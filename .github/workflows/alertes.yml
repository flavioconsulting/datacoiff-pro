name: DataCoiff Pro — Alertes Stock Nuit

on:
  schedule:
    - cron: '0 21 * * *'  # 22h heure francaise (21h UTC)
  workflow_dispatch:        # Lancement manuel pour tester

jobs:
  alertes-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Installer packages R
        run: |
          install.packages(c("DBI", "RPostgres"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Verifier le stock (R)
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: Rscript alert_stock.R

      - name: Envoyer les emails (Python)
        env:
          EMAIL_EXPEDITEUR: ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_PASSE:  ${{ secrets.EMAIL_MOT_PASSE }}
        run: python send_alerts.py
