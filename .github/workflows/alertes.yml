name: DataCoiff Pro — Alertes Stock Nuit

on:
  schedule:
    - cron: '0 21 * * *'  # 22h heure française (21h UTC)
  workflow_dispatch:       # Permet de lancer manuellement pour tester

jobs:
  alertes-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Installer les packages R
        run: |
          install.packages(c("DBI", "RPostgres", "dplyr", "blastula"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Lancer les alertes stock
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          EMAIL_EXPEDITEUR:  ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_PASSE:   ${{ secrets.EMAIL_MOT_PASSE }}
        run: Rscript alert_stock.R
